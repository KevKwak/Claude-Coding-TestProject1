<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: #fff;
            overflow: hidden;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 800px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ffff;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffff00;
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.5);
        }

        #lives-container {
            display: flex;
            gap: 5px;
        }

        .life-icon {
            width: 25px;
            height: 25px;
            background: #ffff00;
            border-radius: 50%;
            clip-path: polygon(100% 50%, 50% 50%, 75% 15%, 100% 0%, 100% 100%, 75% 85%);
            box-shadow: 0 0 10px rgba(255, 255, 0, 0.5);
        }

        #health-bar-container {
            width: 150px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #ff0000;
        }

        #health-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff6600);
            transition: width 0.3s ease;
        }

        #color-bean-timer {
            font-size: 14px;
            color: #ff00ff;
        }

        #game-canvas {
            border: 3px solid #00ffff;
            border-radius: 5px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
        }

        /* Overlays */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            font-size: 64px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px currentColor;
        }

        .overlay p {
            font-size: 24px;
            margin-bottom: 30px;
            color: #aaa;
        }

        .overlay button {
            padding: 15px 40px;
            font-size: 24px;
            background: linear-gradient(135deg, #ffff00, #ffaa00);
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .overlay button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 255, 0, 0.6);
        }

        #pause-overlay h1 {
            color: #00ffff;
        }

        #level-complete-overlay h1 {
            color: #00ff00;
        }

        #game-over-overlay h1 {
            color: #ff0000;
        }

        #victory-overlay h1 {
            color: #ffff00;
            animation: rainbow 2s infinite;
        }

        @keyframes rainbow {
            0% { color: #ff0000; }
            17% { color: #ff8800; }
            33% { color: #ffff00; }
            50% { color: #00ff00; }
            67% { color: #0088ff; }
            83% { color: #8800ff; }
            100% { color: #ff0000; }
        }

        #start-overlay h1 {
            color: #ffff00;
        }

        .controls-info {
            margin-top: 20px;
            font-size: 16px;
            color: #666;
            text-align: center;
        }

        .controls-info span {
            color: #00ffff;
        }

        #beans-remaining {
            color: #00ff00;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="top-bar">
            <div class="stat-box">
                <span class="stat-label">Score</span>
                <span class="stat-value" id="score">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Level</span>
                <span class="stat-value" id="level">1</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Lives</span>
                <div id="lives-container"></div>
            </div>
            <div class="stat-box">
                <span class="stat-label">Health</span>
                <div id="health-bar-container">
                    <div id="health-bar"></div>
                </div>
            </div>
            <div class="stat-box">
                <span class="stat-label">Beans</span>
                <span class="stat-value" id="beans-remaining">0/50</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Color Bean</span>
                <span id="color-bean-timer">60s</span>
            </div>
        </div>
        <canvas id="game-canvas" width="800" height="600"></canvas>
    </div>

    <!-- Start Overlay -->
    <div id="start-overlay" class="overlay">
        <h1>PAC-MAN</h1>
        <p>Eat beans, avoid worms, complete 20 levels!</p>
        <button id="start-btn">Start Game</button>
        <div class="controls-info">
            <p><span>Arrow Keys / WASD</span> - Move</p>
            <p><span>Space</span> - Pause/Resume</p>
        </div>
    </div>

    <!-- Pause Overlay -->
    <div id="pause-overlay" class="overlay hidden">
        <h1>PAUSED</h1>
        <p>Press Space to resume</p>
    </div>

    <!-- Level Complete Overlay -->
    <div id="level-complete-overlay" class="overlay hidden">
        <h1>Level Complete!</h1>
        <p id="level-complete-text">Proceeding to Level 2...</p>
    </div>

    <!-- Game Over Overlay -->
    <div id="game-over-overlay" class="overlay hidden">
        <h1>GAME OVER</h1>
        <p id="final-score">Score: 0</p>
        <button id="restart-btn">Play Again</button>
    </div>

    <!-- Victory Overlay -->
    <div id="victory-overlay" class="overlay hidden">
        <h1>YOU WIN!</h1>
        <p id="victory-score">Final Score: 0</p>
        <button id="victory-restart-btn">Play Again</button>
    </div>

        // ============================================
        // GAME OBJECTS
        // ============================================
        let canvas, ctx;
        let maze = [];
        let beans = [];
        let pacman = {
            x: 1,
            y: 1,
            direction: 'right',
            nextDirection: 'right',
            mouthOpen: 0,
            mouthSpeed: 0.15,
            moving: false
        };

        // ============================================
        // INITIALIZATION
        // ============================================
        function init() {
            canvas = document.getElementById('game-canvas');
            ctx = canvas.getContext('2d');

            // Event listeners
            document.addEventListener('keydown', handleKeyDown);
            document.getElementById('start-btn').addEventListener('click', startGame);
            document.getElementById('restart-btn').addEventListener('click', restartGame);
            document.getElementById('victory-restart-btn').addEventListener('click', restartGame);

            updateLivesDisplay();
        }

        function startGame() {
            document.getElementById('start-overlay').classList.add('hidden');
            resetGameState();
            loadLevel(1);
            gameLoop();
        }

        function restartGame() {
            document.getElementById('game-over-overlay').classList.add('hidden');
            document.getElementById('victory-overlay').classList.add('hidden');
            resetGameState();
            loadLevel(1);
            gameState.paused = false;
            gameState.gameOver = false;
            gameState.victory = false;
        }

        function resetGameState() {
            gameState = {
                score: 0,
                level: 1,
                lives: 3,
                health: 100,
                beansEaten: 0,
                beansRequired: 50,
                paused: false,
                gameOver: false,
                victory: false,
                levelStartTime: Date.now(),
                colorBeanTimer: 60,
                nextColorBeanSpawn: 60,
                colorBeans: [],
                worm: null,
                wormSpawnTimer: 0,
                blueWormStreak: 0,
                effects: {
                    speedHalved: false,
                    speedHalvedTimer: 0,
                    frozen: false,
                    frozenTimer: 0,
                    uncontrolled: false,
                    uncontrolledTimer: 0
                }
            };
            updateLivesDisplay();
            updateUI();
        }

        // ============================================
        // LEVEL MANAGEMENT
        // ============================================
        function loadLevel(levelNum) {
            gameState.level = levelNum;
            gameState.beansRequired = levelNum * 50;
            gameState.beansEaten = 0;
            gameState.levelStartTime = Date.now();
            gameState.colorBeanTimer = 60;
            gameState.nextColorBeanSpawn = 60;
            gameState.colorBeans = [];
            gameState.worm = null;
            gameState.wormSpawnTimer = 3; // Spawn first worm after 3 seconds
            gameState.health = 100;
            gameState.blueWormStreak = 0;

            // Reset effects
            gameState.effects = {
                speedHalved: false,
                speedHalvedTimer: 0,
                frozen: false,
                frozenTimer: 0,
                uncontrolled: false,
                uncontrolledTimer: 0
            };

            // Load maze
            const templateIndex = (levelNum - 1) % MAZE_TEMPLATES.length;
            maze = [];
            beans = [];

            for (let row = 0; row < MAZE_ROWS; row++) {
                maze[row] = [];
                const templateRow = MAZE_TEMPLATES[templateIndex][row] || MAZE_TEMPLATES[0][row];
                for (let col = 0; col < MAZE_COLS; col++) {
                    const char = templateRow[col] || '#';
                    maze[row][col] = char === '#' ? 1 : 0;

                    // Add beans to empty spaces
                    if (char === '.') {
                        beans.push({ x: col, y: row, type: 'normal' });
                    }
                }
            }

            // Set Pacman starting position
            pacman.x = 1;
            pacman.y = 1;
            pacman.direction = 'right';
            pacman.nextDirection = 'right';

            updateUI();
        }

        // ============================================
        // INPUT HANDLING
        // ============================================
        function handleKeyDown(e) {
            if (gameState.gameOver || gameState.victory) return;

            // Pause toggle
            if (e.code === 'Space') {
                e.preventDefault();
                togglePause();
                return;
            }

            if (gameState.paused) return;

            // Movement
            switch(e.code) {
                case 'ArrowUp':
                case 'KeyW':
                    e.preventDefault();
                    pacman.nextDirection = 'up';
                    break;
                case 'ArrowDown':
                case 'KeyS':
                    e.preventDefault();
                    pacman.nextDirection = 'down';
                    break;
                case 'ArrowLeft':
                case 'KeyA':
                    e.preventDefault();
                    pacman.nextDirection = 'left';
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    e.preventDefault();
                    pacman.nextDirection = 'right';
                    break;
            }
        }

        function togglePause() {
            gameState.paused = !gameState.paused;
            document.getElementById('pause-overlay').classList.toggle('hidden', !gameState.paused);
        }

        // ============================================
        // GAME LOOP
        // ============================================
        let lastTime = 0;
        let moveAccumulator = 0;
        const MOVE_INTERVAL = 100; // ms between moves

        function gameLoop(timestamp) {
            if (!timestamp) timestamp = 0;
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            if (!gameState.paused && !gameState.gameOver && !gameState.victory) {
                update(deltaTime);
            }

            render();
            requestAnimationFrame(gameLoop);
        }

        // ============================================
        // UPDATE LOGIC
        // ============================================
        function update(deltaTime) {
            // Update effects
            updateEffects(deltaTime);

            // Color bean spawning
            updateColorBeanSpawning(deltaTime);

            // Worm spawning and movement
            updateWorm(deltaTime);

            // Pacman movement
            if (!gameState.effects.frozen && !gameState.effects.uncontrolled) {
                moveAccumulator += deltaTime;
                const moveInterval = gameState.effects.speedHalved ? MOVE_INTERVAL * 2 : MOVE_INTERVAL;

                if (moveAccumulator >= moveInterval) {
                    moveAccumulator = 0;
                    movePacman();
                }
            } else if (gameState.effects.uncontrolled) {
                // Uncontrolled random movement
                moveAccumulator += deltaTime;
                if (moveAccumulator >= MOVE_INTERVAL) {
                    moveAccumulator = 0;
                    movePacmanRandom();
                }
            }

            // Animate mouth
            pacman.mouthOpen += pacman.mouthSpeed;
            if (pacman.mouthOpen > 1 || pacman.mouthOpen < 0) {
                pacman.mouthSpeed *= -1;
            }

            // Check bean collection
            checkBeanCollection();

            // Check color bean collection
            checkColorBeanCollection();

            // Check worm collision
            checkWormCollision();

            // Check level complete
            if (gameState.beansEaten >= gameState.beansRequired) {
                levelComplete();
            }
        }

        function updateEffects(deltaTime) {
            if (gameState.effects.speedHalved) {
                gameState.effects.speedHalvedTimer -= deltaTime / 1000;
                if (gameState.effects.speedHalvedTimer <= 0) {
                    gameState.effects.speedHalved = false;
                }
            }

            if (gameState.effects.frozen) {
                gameState.effects.frozenTimer -= deltaTime / 1000;
                if (gameState.effects.frozenTimer <= 0) {
                    gameState.effects.frozen = false;
                }
            }

            if (gameState.effects.uncontrolled) {
                gameState.effects.uncontrolledTimer -= deltaTime / 1000;
                if (gameState.effects.uncontrolledTimer <= 0) {
                    gameState.effects.uncontrolled = false;
                }
            }
        }

        function updateColorBeanSpawning(deltaTime) {
            const elapsed = (Date.now() - gameState.levelStartTime) / 1000;

            if (elapsed < 60) {
                gameState.colorBeanTimer = Math.ceil(60 - elapsed);
            } else {
                const timeSinceFirstSpawn = elapsed - 60;
                const nextSpawnIn = 15 - (timeSinceFirstSpawn % 15);
                gameState.colorBeanTimer = Math.ceil(nextSpawnIn);

                // Spawn color bean every 15 seconds
                if (Math.floor(timeSinceFirstSpawn / 15) > gameState.colorBeans.length &&
                    gameState.colorBeans.length < 5) {
                    spawnColorBean();
                }
            }
        }

        function spawnColorBean() {
            // Find empty position
            let attempts = 0;
            while (attempts < 100) {
                const x = Math.floor(Math.random() * (MAZE_COLS - 2)) + 1;
                const y = Math.floor(Math.random() * (MAZE_ROWS - 2)) + 1;

                if (maze[y][x] === 0 && !beans.find(b => b.x === x && b.y === y)) {
                    gameState.colorBeans.push({
                        x, y,
                        spawnTime: Date.now(),
                        color: getRandomColorBeanColor()
                    });
                    break;
                }
                attempts++;
            }
        }

        function getRandomColorBeanColor() {
            const colors = ['#ff00ff', '#00ffff', '#ff8800', '#88ff00', '#ff0088'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function updateWorm(deltaTime) {
            // Worm spawn timer
            if (!gameState.worm) {
                gameState.wormSpawnTimer -= deltaTime / 1000;
                if (gameState.wormSpawnTimer <= 0) {
                    spawnWorm();
                }
            } else {
                // Move worm
                moveWorm(deltaTime);
            }
        }

        function spawnWorm() {
            // Determine worm type based on level progress
            const progressRatio = gameState.beansEaten / gameState.beansRequired;
            const baseProbs = { ...WORM_BASE_PROB };

            // Decrease probabilities as level progresses
            const multiplier = 1 - (progressRatio * 0.5);

            // Random selection
            const rand = Math.random();
            let cumulative = 0;
            let selectedType = 'green';

            for (const [type, prob] of Object.entries(baseProbs)) {
                cumulative += prob * multiplier;
                if (rand < cumulative) {
                    selectedType = type;
                    break;
                }
            }

            // Find spawn position
            let x, y;
            let attempts = 0;
            do {
                x = Math.floor(Math.random() * (MAZE_COLS - 2)) + 1;
                y = Math.floor(Math.random() * (MAZE_ROWS - 2)) + 1;
                attempts++;
            } while ((maze[y][x] === 1 || (x === pacman.x && y === pacman.y)) && attempts < 100);

            gameState.worm = {
                x, y,
                type: selectedType,
                direction: ['up', 'down', 'left', 'right'][Math.floor(Math.random() * 4)],
                moveTimer: 0,
                moveInterval: 200
            };
        }

        function moveWorm(deltaTime) {
            gameState.worm.moveTimer += deltaTime;

            if (gameState.worm.moveTimer >= gameState.worm.moveInterval) {
                gameState.worm.moveTimer = 0;

                // Simple AI: chase player when nearby, otherwise random
                const dx = pacman.x - gameState.worm.x;
                const dy = pacman.y - gameState.worm.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                let newDirection = gameState.worm.direction;

                if (distance < 8) {
                    // Chase player
                    if (Math.abs(dx) > Math.abs(dy)) {
                        newDirection = dx > 0 ? 'right' : 'left';
                    } else {
                        newDirection = dy > 0 ? 'down' : 'up';
                    }
                } else {
                    // Random movement at intersections
                    const possibleDirs = getValidDirections(gameState.worm.x, gameState.worm.y);
                    if (possibleDirs.length > 0) {
                        newDirection = possibleDirs[Math.floor(Math.random() * possibleDirs.length)];
                    }
                }

                // Try to move
                const newPos = getNextPosition(gameState.worm.x, gameState.worm.y, newDirection);
                if (maze[newPos.y] && maze[newPos.y][newPos.x] === 0) {
                    gameState.worm.x = newPos.x;
                    gameState.worm.y = newPos.y;
                    gameState.worm.direction = newDirection;
                } else {
                    // Try other directions
                    const dirs = getValidDirections(gameState.worm.x, gameState.worm.y);
                    if (dirs.length > 0) {
                        gameState.worm.direction = dirs[Math.floor(Math.random() * dirs.length)];
                    }
                }
            }
        }

        function getValidDirections(x, y) {
            const dirs = [];
            if (maze[y-1] && maze[y-1][x] === 0) dirs.push('up');
            if (maze[y+1] && maze[y+1][x] === 0) dirs.push('down');
            if (maze[y][x-1] === 0) dirs.push('left');
            if (maze[y][x+1] === 0) dirs.push('right');
            return dirs;
        }

        function movePacman() {
            // Try to change direction
            const nextPos = getNextPosition(pacman.x, pacman.y, pacman.nextDirection);
            if (maze[nextPos.y] && maze[nextPos.y][nextPos.x] === 0) {
                pacman.direction = pacman.nextDirection;
            }

            // Move in current direction
            const newPos = getNextPosition(pacman.x, pacman.y, pacman.direction);
            if (maze[newPos.y] && maze[newPos.y][newPos.x] === 0) {
                pacman.x = newPos.x;
                pacman.y = newPos.y;
                pacman.moving = true;
            } else {
                pacman.moving = false;
            }
        }

        function movePacmanRandom() {
            const directions = ['up', 'down', 'left', 'right'];
            pacman.direction = directions[Math.floor(Math.random() * directions.length)];
            movePacman();
        }

        function getNextPosition(x, y, direction) {
            switch(direction) {
                case 'up': return { x, y: y - 1 };
                case 'down': return { x, y: y + 1 };
                case 'left': return { x: x - 1, y };
                case 'right': return { x: x + 1, y };
            }
            return { x, y };
        }

        function checkBeanCollection() {
            const beanIndex = beans.findIndex(b => b.x === pacman.x && b.y === pacman.y && b.type === 'normal');
            if (beanIndex !== -1) {
                beans.splice(beanIndex, 1);
                gameState.beansEaten++;
                gameState.score++;
                updateUI();
                playSound('eat');
            }
        }

        function checkColorBeanCollection() {
            const now = Date.now();
            const beanIndex = gameState.colorBeans.findIndex(b =>
                b.x === pacman.x && b.y === pacman.y
            );

            if (beanIndex !== -1) {
                const bean = gameState.colorBeans[beanIndex];
                gameState.colorBeans.splice(beanIndex, 1);
                gameState.beansEaten += 10;
                gameState.score += 10;
                updateUI();
                playSound('powerup');
            }

            // Remove expired color beans
            gameState.colorBeans = gameState.colorBeans.filter(b =>
                (now - b.spawnTime) < 10000
            );
        }

        function checkWormCollision() {
            if (!gameState.worm) return;

            if (gameState.worm.x === pacman.x && gameState.worm.y === pacman.y) {
                handleWormEffect(gameState.worm.type);
                gameState.worm = null;
                gameState.wormSpawnTimer = 10; // Next worm in 10 seconds
            }
        }

        function handleWormEffect(type) {
            playSound('worm');

            switch(type) {
                case 'green':
                    gameState.health -= 25;
                    break;
                case 'blue':
                    gameState.blueWormStreak++;
                    if (gameState.blueWormStreak >= 2) {
                        gameState.effects.frozen = true;
                        gameState.effects.frozenTimer = 3;
                        gameState.blueWormStreak = 0;
                    } else {
                        gameState.effects.speedHalved = true;
                        gameState.effects.speedHalvedTimer = 10;
                    }
                    break;
                case 'red':
                    gameState.health -= 50;
                    break;
                case 'purple':
                    gameState.effects.uncontrolled = true;
                    gameState.effects.uncontrolledTimer = 5;
                    break;
            }

            // Reset blue streak for non-blue worms
            if (type !== 'blue') {
                gameState.blueWormStreak = 0;
            }

            updateHealthBar();

            if (gameState.health <= 0) {
                loseLife();
            }
        }

        function loseLife() {
            gameState.lives--;
            updateLivesDisplay();

            if (gameState.lives <= 0) {
                gameOver();
            } else {
                // Restart current level
                loadLevel(gameState.level);
            }
        }

        function levelComplete() {
            if (gameState.level >= 20) {
                victory();
            } else {
                // Show level complete screen
                document.getElementById('level-complete-text').textContent =
                    `Proceeding to Level ${gameState.level + 1}...`;
                document.getElementById('level-complete-overlay').classList.remove('hidden');

                setTimeout(() => {
                    document.getElementById('level-complete-overlay').classList.add('hidden');
                    loadLevel(gameState.level + 1);
                }, 2000);
            }
        }

        function gameOver() {
            gameState.gameOver = true;
            document.getElementById('final-score').textContent = `Score: ${gameState.score}`;
            document.getElementById('game-over-overlay').classList.remove('hidden');
            playSound('gameover');
        }

        function victory() {
            gameState.victory = true;
            document.getElementById('victory-score').textContent = `Final Score: ${gameState.score}`;
            document.getElementById('victory-overlay').classList.remove('hidden');
            playSound('victory');
        }

        // ============================================
        // RENDERING
        // ============================================
        function render() {
            // Clear canvas
            ctx.fillStyle = COLORS.background;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // Draw maze
            drawMaze();

            // Draw beans
            drawBeans();

            // Draw color beans
            drawColorBeans();

            // Draw worm
            drawWorm();

            // Draw Pacman
            drawPacman();

            // Draw effect indicators
            drawEffectIndicators();
        }

        function drawMaze() {
            const offsetX = (CANVAS_WIDTH - MAZE_COLS * CELL_SIZE) / 2;
            const offsetY = (CANVAS_HEIGHT - MAZE_ROWS * CELL_SIZE) / 2;

            for (let row = 0; row < MAZE_ROWS; row++) {
                for (let col = 0; col < MAZE_COLS; col++) {
                    if (maze[row][col] === 1) {
                        const x = offsetX + col * CELL_SIZE;
                        const y = offsetY + row * CELL_SIZE;

                        // Glow effect
                        ctx.shadowColor = COLORS.wallGlow;
                        ctx.shadowBlur = 5;

                        ctx.fillStyle = COLORS.wall;
                        ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);

                        ctx.shadowBlur = 0;
                    }
                }
            }
        }

        function drawBeans() {
            const offsetX = (CANVAS_WIDTH - MAZE_COLS * CELL_SIZE) / 2;
            const offsetY = (CANVAS_HEIGHT - MAZE_ROWS * CELL_SIZE) / 2;

            ctx.fillStyle = COLORS.bean;
            ctx.shadowColor = COLORS.bean;
            ctx.shadowBlur = 3;

            for (const bean of beans) {
                if (bean.type === 'normal') {
                    const x = offsetX + bean.x * CELL_SIZE + CELL_SIZE / 2;
                    const y = offsetY + bean.y * CELL_SIZE + CELL_SIZE / 2;

                    ctx.beginPath();
                    ctx.arc(x, y, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            ctx.shadowBlur = 0;
        }

        function drawColorBeans() {
            const offsetX = (CANVAS_WIDTH - MAZE_COLS * CELL_SIZE) / 2;
            const offsetY = (CANVAS_HEIGHT - MAZE_ROWS * CELL_SIZE) / 2;

            for (const bean of gameState.colorBeans) {
                const x = offsetX + bean.x * CELL_SIZE + CELL_SIZE / 2;
                const y = offsetY + bean.y * CELL_SIZE + CELL_SIZE / 2;

                // Pulsing effect
                const pulse = Math.sin(Date.now() / 200) * 2 + 8;

                ctx.shadowColor = bean.color;
                ctx.shadowBlur = 10;
                ctx.fillStyle = bean.color;

                ctx.beginPath();
                ctx.arc(x, y, pulse, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowBlur = 0;
            }
        }

        function drawWorm() {
            if (!gameState.worm) return;

            const offsetX = (CANVAS_WIDTH - MAZE_COLS * CELL_SIZE) / 2;
            const offsetY = (CANVAS_HEIGHT - MAZE_ROWS * CELL_SIZE) / 2;

            const x = offsetX + gameState.worm.x * CELL_SIZE + CELL_SIZE / 2;
            const y = offsetY + gameState.worm.y * CELL_SIZE + CELL_SIZE / 2;

            const colors = {
                green: COLORS.wormGreen,
                blue: COLORS.wormBlue,
                red: COLORS.wormRed,
                purple: COLORS.wormPurple
            };

            ctx.shadowColor = colors[gameState.worm.type];
            ctx.shadowBlur = 10;
            ctx.fillStyle = colors[gameState.worm.type];

            // Draw worm as a wavy shape
            ctx.beginPath();
            const time = Date.now() / 100;
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const wave = Math.sin(time + i) * 2;
                const rx = 7 + wave;
                const ry = 5 + wave;
                ctx.lineTo(
                    x + Math.cos(angle) * rx,
                    y + Math.sin(angle) * ry
                );
            }
            ctx.closePath();
            ctx.fill();

            // Eyes
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(x - 3, y - 2, 2, 0, Math.PI * 2);
            ctx.arc(x + 3, y - 2, 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;
        }

        function drawPacman() {
            const offsetX = (CANVAS_WIDTH - MAZE_COLS * CELL_SIZE) / 2;
            const offsetY = (CANVAS_HEIGHT - MAZE_ROWS * CELL_SIZE) / 2;

            const x = offsetX + pacman.x * CELL_SIZE + CELL_SIZE / 2;
            const y = offsetY + pacman.y * CELL_SIZE + CELL_SIZE / 2;
            const radius = CELL_SIZE / 2 - 2;

            // Direction angles
            const angles = {
                'right': 0,
                'down': Math.PI / 2,
                'left': Math.PI,
                'up': -Math.PI / 2
            };

            const baseAngle = angles[pacman.direction];
            const mouthAngle = pacman.mouthOpen * 0.4;

            // Glow
            ctx.shadowColor = COLORS.pacman;
            ctx.shadowBlur = 10;

            ctx.fillStyle = COLORS.pacman;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.arc(x, y, radius, baseAngle + mouthAngle, baseAngle + Math.PI * 2 - mouthAngle);
            ctx.closePath();
            ctx.fill();

            // Eye
            const eyeOffset = 4;
            const eyeAngle = baseAngle - Math.PI / 4;
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(
                x + Math.cos(eyeAngle) * eyeOffset,
                y + Math.sin(eyeAngle) * eyeOffset,
                2, 0, Math.PI * 2
            );
            ctx.fill();

            ctx.shadowBlur = 0;
        }

        function drawEffectIndicators() {
            const indicators = [];

            if (gameState.effects.speedHalved) {
                indicators.push({ text: 'SLOWED', color: '#0088ff' });
            }
            if (gameState.effects.frozen) {
                indicators.push({ text: 'FROZEN', color: '#00ffff' });
            }
            if (gameState.effects.uncontrolled) {
                indicators.push({ text: 'CONFUSED', color: '#aa00ff' });
            }

            ctx.font = 'bold 16px Courier New';
            indicators.forEach((ind, i) => {
                ctx.fillStyle = ind.color;
                ctx.shadowColor = ind.color;
                ctx.shadowBlur = 5;
                ctx.fillText(ind.text, 10, CANVAS_HEIGHT - 20 - i * 25);
            });
            ctx.shadowBlur = 0;
        }

        // ============================================
        // UI UPDATES
        // ============================================
        function updateUI() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('beans-remaining').textContent =
                `${gameState.beansEaten}/${gameState.beansRequired}`;
            document.getElementById('color-bean-timer').textContent =
                `${gameState.colorBeanTimer}s`;
            updateHealthBar();
        }

        function updateHealthBar() {
            document.getElementById('health-bar').style.width = `${gameState.health}%`;
        }

        function updateLivesDisplay() {
            const container = document.getElementById('lives-container');
            container.innerHTML = '';

            for (let i = 0; i < gameState.lives; i++) {
                const icon = document.createElement('div');
                icon.className = 'life-icon';
                container.appendChild(icon);
            }
        }

        // ============================================
        // SOUND EFFECTS (Simple Web Audio)
        // ============================================
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            switch(type) {
                case 'eat':
                    oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.05);
                    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.05);
                    break;
                case 'powerup':
                    oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.2);
                    gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.2);
                    break;
                case 'worm':
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(200, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                    gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.3);
                    break;
                case 'gameover':
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 1);
                    gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 1);
                    break;
                case 'victory':
                    oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
                    oscillator.frequency.setValueAtTime(500, audioCtx.currentTime + 0.1);
                    oscillator.frequency.setValueAtTime(600, audioCtx.currentTime + 0.2);
                    oscillator.frequency.setValueAtTime(800, audioCtx.currentTime + 0.3);
                    gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.5);
                    break;
            }
        }

        // Initialize game when page loads
        window.onload = init;
    </script>
</body>
